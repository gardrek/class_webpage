<!DOCTYPE html>
<html>
  <head>
    <title>
      My Personal Webpage
    </title>
    <style>
      body {
        background-color: powderblue;
        font-family: Arial;
        color: black;
        /*text-align: center;*/
      }
      div.header {
        background-color: tomato;
        color: white;
        text-align: center;
        padding: 20px;
      }
      h1 {
        color: navy;
        font-size: 36px;
      }
      p {
        color: navy;
        font-size: 36px;
      }
      .grid-container {
        display: grid;
        grid-template-columns: auto auto auto;
        gap: 10px;
        background-color: #f8f8f8
        padding: 10px;
      }
      .grid-item {
        background-color: #4caf50;
        color: white;
        padding: 20px;
        text-align: center;
      }
      img {
        width: 200px;
        height: 125px;
        border-radius: 50%;
        border: 3px solid green;
        margin-top: 10px;
      }
      .flex-container {
        display: flex;
        justify-content: space-around;
        background-color: lightgray;
        padding: 20px;
      }
      .flex-item {
        background-color: steelblue;
        color: white;
        padding: 20px;
        width: 30%;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>
        Welcome to My Personal Webpage
      </h1>
      <p>
        This is a simple example of an HTML, JavaScript, and CSS personal webpage.
      </p>
      <pre style="font-size: 24px">
      Name: John Doe
      Age: 25
      Location: Kansas City
      </pre>
      <br>
      <div class="grid-container">
        <div class="grid-item">
          <a href="https://gardrek.itch.io" style="color: black" target="_blank">
            <button class="button-transition">
              Visit my itch.io page or else!
            </button>
          </a>
        </div>
        <div class="grid-item">
          <!-- empty -->
        </div>
        <div class="grid-item">
          <a href="jsadventure.html" style="color: black" target="_blank">
            <button class="button-transition">
              JavaScript Adventure
            </button>
          </a>
        </div>
        <div class="grid-item">
          <!-- empty -->
        </div>
        <div class="grid-item">
          <a href="adventure.html" style="color: black" target="_blank">
            <button class="button-transition">
              Adventure Game Webpage
            </button>
          </a>
        </div>
        <div class="grid-item">
          <!-- empty -->
        </div>
      </div>
    </div>
    <div class="flex-container">
      <div class="flex-item">
        <p>
          Check out my favorite website:
          <a href="https://wikipedia.org/" target="_blank">
            Wikipedia
          </a>
        </p>
      </div>
      <div class="flex-item">
        <a href="https://gardrek.itch.io/" target="_blank">
          <img src="assets/Palm_Island_R.svg" alt="Sample Image">
        </a>
      </div>
      <div class="flex-item">
        <p>
          Email me at the following address
          <a href="mailto:@@@@@@djm.dot.gov.ny.us" target="_blank">
            @@@@@@djm.dot.gov.ny.us
          </a>
        </p>
      </div>
    </div>
